<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frutas-ProMaster | Mundial Match Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .seccion { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Animación para la ventana de jugadores */
        #modal-jugadores { transition: opacity 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; transform: translateY(100%); }
        #modal-jugadores:not(.hidden) .modal-content { transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans flex flex-col overflow-x-hidden">

    <header class="sticky top-0 z-40 bg-gray-900/95 backdrop-blur-md border-b border-gray-800 pt-6 pb-4 px-4 shadow-xl">
        <div class="max-w-4xl mx-auto flex justify-center items-center">
            <h1 class="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500">
                Frutas-ProMaster Mundial
            </h1>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full p-4 mt-2 pb-24">
        
        <section id="sec-envivo" class="seccion block">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Jugándose Ahora</h2>
                <span class="text-xs font-bold text-green-400 flex items-center gap-2 bg-green-400/10 px-3 py-1 rounded-full animate-pulse">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> Auto-actualizando
                </span>
            </div>
            <div id="contenedor-envivo" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <p class="text-gray-400 text-sm animate-pulse">Conectando con el servidor...</p>
            </div>
        </section>

        <section id="sec-proximos" class="seccion hidden">
            <h2 class="text-xl font-bold mb-6 border-b border-gray-800 pb-2">Calendario Completo</h2>
            <div id="contenedor-proximos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-resultados" class="seccion hidden">
            <h2 class="text-xl font-bold mb-6 border-b border-gray-800 pb-2">Todos los Resultados</h2>
            <div id="contenedor-resultados" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="sec-grupos" class="seccion hidden">
            <h2 class="text-xl font-bold mb-6 border-b border-gray-800 pb-2">Tabla de Posiciones</h2>
            <div id="contenedor-grupos" class="space-y-4"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 w-full z-40 bg-gray-900/95 backdrop-blur-lg border-t border-gray-800 pb-safe">
        <div class="max-w-4xl mx-auto flex justify-around items-center h-16 px-2">
            <!-- Botones de Navegación (Igual que en la versión anterior) -->
            <button onclick="cambiarPestana('envivo')" id="nav-envivo" class="nav-item text-blue-500 flex flex-col items-center justify-center w-full h-full transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[10px] font-semibold">En Vivo</span>
            </button>
            <button onclick="cambiarPestana('proximos')" id="nav-proximos" class="nav-item text-gray-500 hover:text-gray-300 flex flex-col items-center justify-center w-full h-full transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] font-semibold">Próximos</span>
            </button>
            <button onclick="cambiarPestana('resultados')" id="nav-resultados" class="nav-item text-gray-500 hover:text-gray-300 flex flex-col items-center justify-center w-full h-full transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                <span class="text-[10px] font-semibold">Resultados</span>
            </button>
            <button onclick="cambiarPestana('grupos')" id="nav-grupos" class="nav-item text-gray-500 hover:text-gray-300 flex flex-col items-center justify-center w-full h-full transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="text-[10px] font-semibold">Grupos</span>
            </button>
        </div>
    </nav>

    <!-- VENTANA EMERGENTE (MODAL) PARA JUGADORES -->
    <div id="modal-jugadores" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex items-end sm:items-center justify-center">
        <div class="modal-content bg-gray-900 w-full sm:w-96 max-h-[85vh] rounded-t-3xl sm:rounded-3xl flex flex-col border border-gray-700 shadow-2xl">
            
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-800/50 rounded-t-3xl">
                <div class="flex items-center gap-3">
                    <img id="modal-escudo" src="" class="w-8 h-8 object-contain drop-shadow-md">
                    <h3 id="modal-titulo" class="font-black text-lg">Cargando...</h3>
                </div>
                <button onclick="cerrarPlantilla()" class="bg-gray-700 hover:bg-gray-600 rounded-full p-2 text-gray-300 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div id="modal-lista" class="p-4 overflow-y-auto no-scrollbar space-y-4 flex-grow">
                <div class="flex justify-center items-center py-10">
                    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MIENTRAS PRUEBAS EN TU COMPUTADORA, USA LOCALHOST. 
        // Cuando subas el backend a Railway, cambiarás esta URL por la que te dé Railway (ej: https://frutas-backend.up.railway.app)
        const URL_BACKEND = 'http://localhost:3000';

        function cambiarPestana(idDestino) {
            document.querySelectorAll('.seccion').forEach(sec => sec.classList.add('hidden'));
            document.querySelectorAll('.seccion').forEach(sec => sec.classList.remove('block'));
            document.getElementById(`sec-${idDestino}`).classList.remove('hidden');
            document.getElementById(`sec-${idDestino}`).classList.add('block');

            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('text-blue-500');
                btn.classList.add('text-gray-500', 'hover:text-gray-300');
            });

            const btnActivo = document.getElementById(`nav-${idDestino}`);
            btnActivo.classList.remove('text-gray-500', 'hover:text-gray-300');
            btnActivo.classList.add('text-blue-500');
        }

        // --- LÓGICA DE LA VENTANA DE JUGADORES ---
        async function abrirPlantilla(idEquipo, nombreEquipo, urlEscudo) {
            if(!idEquipo) return;
            
            const modal = document.getElementById('modal-jugadores');
            const titulo = document.getElementById('modal-titulo');
            const escudo = document.getElementById('modal-escudo');
            const lista = document.getElementById('modal-lista');

            titulo.innerText = nombreEquipo;
            escudo.src = urlEscudo || 'https://via.placeholder.com/40';
            lista.innerHTML = `<div class="flex justify-center py-10"><div class="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500"></div></div>`;
            
            modal.classList.remove('hidden');

            try {
                // Aquí llamamos a TU servidor, no a la API oficial
                const respuesta = await fetch(`${URL_BACKEND}/api/equipo/${idEquipo}`);
                const equipo = await respuesta.json();
                
                const jugadores = equipo.squad || [];
                if(jugadores.length === 0) {
                    lista.innerHTML = '<p class="text-center text-gray-500 py-6">Plantilla no disponible aún.</p>';
                    return;
                }

                // Agrupar jugadores por posición
                const posiciones = { 'Goalkeeper': 'Porteros', 'Defence': 'Defensas', 'Midfield': 'Medios', 'Offence': 'Delanteros' };
                let htmlPlantilla = '';

                Object.keys(posiciones).forEach(posIngles => {
                    const filtrados = jugadores.filter(j => j.position === posIngles);
                    if(filtrados.length > 0) {
                        htmlPlantilla += `
                            <div class="mb-4">
                                <h4 class="text-xs font-black text-blue-400 uppercase tracking-widest border-b border-gray-700/50 pb-1 mb-2">${posiciones[posIngles]}</h4>
                                <ul class="space-y-2">
                                    ${filtrados.map(j => `
                                        <li class="bg-gray-800/50 p-3 rounded-xl flex items-center justify-between border border-gray-700/30">
                                            <span class="font-bold text-sm">${j.name}</span>
                                            <span class="text-xs text-gray-500 font-mono bg-gray-900 px-2 py-1 rounded-md">
                                                ${j.shirtNumber ? '#' + j.shirtNumber : '-'}
                                            </span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        `;
                    }
                });

                lista.innerHTML = htmlPlantilla;

            } catch (error) {
                lista.innerHTML = '<p class="text-center text-red-500 py-6">Error al cargar la plantilla.</p>';
            }
        }

        function cerrarPlantilla() {
            document.getElementById('modal-jugadores').classList.add('hidden');
        }

        function crearTarjetaPartido(partido) {
            let status = partido.status;
            let isLive = (status === 'IN_PLAY' || status === 'PAUSED');
            
            if (isLive) status = 'EN VIVO';
            else if (status === 'SCHEDULED' || status === 'TIMED') status = 'PRÓXIMO';
            else if (status === 'FINISHED') status = 'FINALIZADO';

            const homeScore = partido.score.fullTime.home ?? '-';
            const awayScore = partido.score.fullTime.away ?? '-';
            
            const fechaPartido = new Date(partido.utcDate);
            const fechaStr = fechaPartido.toLocaleDateString();
            const horaStr = fechaPartido.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const escudoLocal = partido.homeTeam.crest || 'https://via.placeholder.com/40';
            const escudoVisita = partido.awayTeam.crest || 'https://via.placeholder.com/40';
            const nombreLocal = partido.homeTeam.tla || partido.homeTeam.name || 'TBD';
            const nombreVisita = partido.awayTeam.tla || partido.awayTeam.name || 'TBD';

            // Observa el onclick en los contenedores de los equipos, esto abre la plantilla
            return `
                <div class="bg-gray-800/80 backdrop-blur-sm rounded-2xl p-5 shadow-lg border ${isLive ? 'border-green-500/50 shadow-green-500/10' : 'border-gray-700/50'}">
                    <div class="flex justify-between items-center text-xs text-gray-400 mb-4 border-b border-gray-700/50 pb-3">
                        <span class="flex items-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            ${fechaStr} • ${horaStr}
                        </span>
                        <span class="px-2 py-1 rounded font-black text-[10px] tracking-wider ${isLive ? 'bg-green-500/20 text-green-400 animate-pulse' : 'bg-gray-700/50 text-gray-300'}">
                            ${status}
                        </span>
                    </div>
                    
                    <div class="flex justify-between items-center mt-2">
                        <div class="flex flex-col items-center w-1/3 cursor-pointer hover:scale-105 transition-transform" onclick="abrirPlantilla(${partido.homeTeam.id}, '${nombreLocal}', '${escudoLocal}')">
                            <img src="${escudoLocal}" class="w-12 h-12 mb-3 object-contain drop-shadow-md"/>
                            <span class="font-bold text-center text-sm truncate w-full">${nombreLocal}</span>
                        </div>
                        
                        <div class="text-4xl font-black w-1/3 text-center tracking-tighter ${isLive ? 'text-green-400' : 'text-white'}">
                            ${homeScore} - ${awayScore}
                        </div>
                        
                        <div class="flex flex-col items-center w-1/3 cursor-pointer hover:scale-105 transition-transform" onclick="abrirPlantilla(${partido.awayTeam.id}, '${nombreVisita}', '${escudoVisita}')">
                            <img src="${escudoVisita}" class="w-12 h-12 mb-3 object-contain drop-shadow-md"/>
                            <span class="font-bold text-center text-sm truncate w-full">${nombreVisita}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function distribuirPartidos(partidos) {
            const contEnVivo = document.getElementById('contenedor-envivo');
            const contProximos = document.getElementById('contenedor-proximos');
            const contResultados = document.getElementById('contenedor-resultados');
            
            const enVivo = partidos.filter(p => p.status === 'IN_PLAY' || p.status === 'PAUSED');
            
            // Ya no hay límite .slice(), se muestran todos
            const proximos = partidos.filter(p => p.status === 'SCHEDULED' || p.status === 'TIMED');
            const terminados = partidos.filter(p => p.status === 'FINISHED' || p.status === 'AWARDED').reverse(); 

            contEnVivo.innerHTML = enVivo.length ? enVivo.map(crearTarjetaPartido).join('') : `
                <div class="col-span-1 md:col-span-2 bg-gray-800/30 rounded-2xl p-8 text-center border border-gray-700/50 border-dashed">
                    <svg class="w-12 h-12 mx-auto text-gray-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p class="text-gray-400 font-medium">No hay partidos jugándose en este momento.</p>
                </div>`;
            
            contProximos.innerHTML = proximos.length ? proximos.map(crearTarjetaPartido).join('') : '<p class="text-gray-400">No hay partidos próximos.</p>';
            contResultados.innerHTML = terminados.length ? terminados.map(crearTarjetaPartido).join('') : '<p class="text-gray-400">No hay resultados.</p>';
        }

        function renderizarGrupos(standings) {
            // Se mantiene exactamente igual a la versión que te gustó
            const contGrupos = document.getElementById('contenedor-grupos');
            contGrupos.innerHTML = '';
            const gruposFiltrados = standings.filter(s => s.type === 'TOTAL');

            if(gruposFiltrados.length === 0) {
                contGrupos.innerHTML = '<p class="text-gray-400">Grupos no definidos.</p>';
                return;
            }

            gruposFiltrados.forEach(grupo => {
                const nombreGrupo = (grupo.group || '').replace('GROUP_', 'GRUPO ');
                let filasHtml = grupo.table.map((equipo, i) => `
                    <tr class="border-b border-gray-700/50 hover:bg-gray-700/30 transition-colors cursor-pointer" onclick="abrirPlantilla(${equipo.team.id}, '${equipo.team.tla || equipo.team.shortName}', '${equipo.team.crest}')">
                        <td class="px-3 py-4 flex items-center gap-3">
                            <span class="text-gray-500 font-mono w-4 text-xs">${i + 1}</span>
                            <img src="${equipo.team.crest || 'https://via.placeholder.com/20'}" class="w-6 h-6 object-contain drop-shadow-sm" />
                            <span class="font-bold text-sm">${equipo.team.tla || equipo.team.shortName}</span>
                        </td>
                        <td class="px-2 py-4 text-center text-gray-400 text-sm">${equipo.playedGames}</td>
                        <td class="px-2 py-4 text-center text-gray-400 text-sm">${equipo.goalDifference}</td>
                        <td class="px-3 py-4 text-center font-black text-blue-400">${equipo.points}</td>
                    </tr>
                `).join('');

                contGrupos.innerHTML += `
                    <div class="bg-gray-800/80 backdrop-blur-sm rounded-2xl overflow-hidden shadow-lg border border-gray-700/50 mb-6">
                        <div class="bg-gradient-to-r from-gray-800 to-gray-900 p-4 font-black text-sm tracking-widest text-white border-b border-gray-700/50 flex items-center gap-2">
                            <div class="w-1.5 h-4 bg-blue-500 rounded-full"></div>
                            ${nombreGrupo}
                        </div>
                        <table class="w-full text-sm text-left">
                            <thead class="text-gray-400 uppercase bg-gray-900/50 text-[10px] tracking-wider">
                                <tr>
                                    <th class="px-3 py-3 font-semibold">Selección (Toque para plantilla)</th>
                                    <th class="px-2 py-3 text-center font-semibold">PJ</th>
                                    <th class="px-2 py-3 text-center font-semibold">DG</th>
                                    <th class="px-3 py-3 text-center font-bold text-white">Pts</th>
                                </tr>
                            </thead>
                            <tbody>${filasHtml}</tbody>
                        </table>
                    </div>`;
            });
        }

        // --- CONEXIÓN AL NUEVO SERVIDOR ---
        async function obtenerDatos() {
            try {
                const resPartidos = await fetch(`${URL_BACKEND}/api/partidos`);
                if (resPartidos.ok) {
                    const datos = await resPartidos.json();
                    distribuirPartidos(datos.matches || []);
                }

                if(document.getElementById('contenedor-grupos').innerHTML.trim() === '') {
                    const resGrupos = await fetch(`${URL_BACKEND}/api/grupos`);
                    if (resGrupos.ok) {
                        const datos = await resGrupos.json();
                        renderizarGrupos(datos.standings || []);
                    }
                }
            } catch (error) {
                console.error("Error al obtener datos:", error);
            }
        }

        obtenerDatos();
        setInterval(obtenerDatos, 60000); // 1 minuto exacto, porque el caché de tu servidor lo protege
    </script>
</body>
</html>
